name: web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'app/**'
      - 'alembic/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/web.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'app/**'
      - 'alembic/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/web.yml'

jobs:
  lint-typecheck-build:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests + coverage
        run: pnpm test:run --coverage

      - name: Build
        run: pnpm build

  codegen-drift:
    name: OpenAPI codegen drift
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mezan_codegen
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: uv sync --dev

      - name: Alembic upgrade
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mezan_codegen
          ENVIRONMENT: dev
          SECRET_KEY: ci-codegen-secret
        run: uv run alembic upgrade head

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Start API, codegen, drift check
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mezan_codegen
          ENVIRONMENT: dev
          SECRET_KEY: ci-codegen-secret
        run: |
          uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          UVICORN_PID=$!
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/openapi.json > /dev/null; then
              echo "OpenAPI ready"
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8000/openapi.json > /dev/null
          cd web
          pnpm install --frozen-lockfile
          OPENAPI_URL=http://127.0.0.1:8000/openapi.json pnpm codegen
          cd ..
          git diff --exit-code -- web/src/api/generated/schema.ts
          kill $UVICORN_PID
