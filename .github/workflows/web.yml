name: web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'app/**/openapi*'
      - '.github/workflows/web.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'app/**/openapi*'
      - '.github/workflows/web.yml'

# Codegen drift, unit tests, Playwright and bundle-size gates are deliberately
# deferred — they land in W-4 / W-5 / W-6 respectively. W-1 only enforces
# lint + typecheck + build so the scaffolding stays honest.

jobs:
  lint-typecheck-build:
    name: lint · typecheck · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
