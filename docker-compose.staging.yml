version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mezan_db_staging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mezan}
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mezan_network_staging
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.staging
    container_name: mezan_api_staging
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mezan}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mezan}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      ENVIRONMENT: staging
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
      API_HOST: 0.0.0.0
      API_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mezan_network_staging
    restart: unless-stopped

volumes:
  postgres_data_staging:

networks:
  mezan_network_staging:
    driver: bridge
