# SPA static host for `web/dist` (production / staging).
# Font and asset paths must NOT fall through to index.html — browsers parse HTML as
# font bytes and stall rendering (OTS invalid sfntVersion / "<!DO" errors).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Binary static assets: serve file or 404 (never SPA shell).
    location ~* \.(?:woff2?|ttf|otf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:js|mjs|css|png|jpe?g|gif|svg|ico|webp|avif|map)$ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Legacy public/ font paths (if present in dist); still no HTML fallback.
    location /fonts/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # When the API is reverse-proxied behind this host, add a block like:
    # location /api/v1/realtime/events {
    #     proxy_pass http://mezan_api:8000;
    #     proxy_http_version 1.1;
    #     proxy_buffering off;
    #     proxy_read_timeout 3600s;
    #     proxy_set_header Connection '';
    #     chunked_transfer_encoding off;
    # }
}
